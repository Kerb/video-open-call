<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Видеозвонок</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="/socket.io/socket.io.js"></script>
  <script defer src="shared-state.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div id="app">

    <div id="home-screen" class="screen">
      <div class="home-content">
        <div class="logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23 7 16 12 23 17 23 7"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
          <h1>Видеозвонок</h1>
        </div>
        <p class="subtitle">P2P видео и аудиосвязь через браузер</p>
        <div class="home-buttons">
          <button id="btn-create" class="btn btn-primary">Создать комнату</button>
          <button id="btn-join" class="btn btn-secondary">Подключиться к комнате</button>
        </div>
      </div>
      </div>
      <footer class="app-footer" id="app-version"></footer>

      <div id="join-modal" class="modal-overlay" style="display:none">
      <div class="modal-card">
        <button id="btn-close-modal" class="modal-close">&times;</button>
        <h2>Введите код комнаты</h2>
        <p class="modal-hint">6 символов: буквы A–Z (без O,I) и цифры 2–9 (без 0,1)</p>
        <div class="code-inputs">
          <input type="text" maxlength="6" class="code-input" id="code-input" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="characters" placeholder="XXXXXX">
        </div>
        <div id="modal-error" class="modal-error"></div>
        <button id="btn-join-room" class="btn btn-primary btn-full">Подключиться</button>
      </div>
    </div>

    <div id="room-screen" class="screen" style="display:none">
      <div id="video-container">
        <div id="remote-container" class="video-wrapper">
          <video id="remoteVideo" autoplay playsinline></video>
          <div class="placeholder" id="remote-placeholder" style="display:none">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
          </div>
          <div class="pip-label" id="remote-mute-indicator" style="display:none">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          </div>
          <div id="remote-screen-indicator" style="display:none">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            <span>Screen</span>
          </div>
        </div>
        <div id="local-container" class="video-wrapper pip">
          <video id="localVideo" autoplay playsinline muted></video>
          <div class="placeholder" id="local-placeholder" style="display:flex">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
          </div>
        </div>
      </div>

      <div id="room-info">
        <span id="room-code-label">Код: <strong id="room-code">---</strong></span>
        <a id="copy-link" href="#" class="copy-link">Копировать</a>
      </div>

      <div id="controls">
        <button id="btn-mute" class="control-btn" data-active="false" title="Микрофон">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
          </svg>
        </button>
        <button id="btn-speaker" class="control-btn" data-active="true" title="Динамик">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
        </button>
        <button id="btn-camera" class="control-btn" data-active="false" title="Камера">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
          </svg>
        </button>
        <button id="btn-screen" class="control-btn" data-active="false" title="Демонстрация экрана">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </button>
        <button id="btn-chat" class="control-btn" data-active="false" title="Чат">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
          </svg>
          <span id="chat-badge" class="chat-badge" style="display:none">0</span>
        </button>
        <button id="btn-hangup" class="control-btn hangup" title="Завершить звонок">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="chat-panel" class="chat-panel" style="display:none">
      <div class="chat-header">
        <span>Чат</span>
        <button id="btn-close-chat">&times;</button>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Введите сообщение..." maxlength="500">
        <button id="btn-send-chat">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="reconnecting-overlay" style="display:none">
      <div class="reconnecting-content">
        <div class="spinner"></div>
        <p>Потеряно соединение</p>
        <p class="reconnecting-hint" id="reconnect-status">
          Попытка переподключения...
        </p>
        <div class="reconnect-buttons">
          <button id="btn-retry-reconnect" class="btn btn-secondary">
            Повторить попытку
          </button>
          <button id="btn-leave-reconnect" class="btn btn-secondary btn-danger">
            Выйти из комнаты
          </button>
        </div>
      </div>
    </div>

    <div id="peer-reconnecting-indicator" style="display:none">
      <p>Собеседник временно отключился</p>
      <p class="hint">Ожидание переподключения...</p>
      <button id="btn-leave-peer-reconnect" class="btn btn-secondary btn-danger">
        Выйти из комнаты
      </button>
    </div>

    <div id="notification" class="notification" style="display:none"></div>
    <div id="chat-toast" class="chat-toast" style="display:none"></div>

  </div>
</body>
</html>
